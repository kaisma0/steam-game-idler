name: Build release bundle

on:
  workflow_dispatch:
    inputs:
      force_dotnet_build:
        description: "Force .NET rebuild"
        required: false
        type: boolean
        default: false
      force_pnpm_install:
        description: "Force fresh pnpm install"
        required: false
        type: boolean
        default: false
      force_cargo_clean:
        description: "Force cargo clean"
        required: false
        type: boolean
        default: false
      force_nextjs_build:
        description: "Force Next.js rebuild"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  get_version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Extract version from latest.json
        id: extract
        run: |
          VERSION=$(jq -r .version latest.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  build_dotnet_libs:
    runs-on: windows-latest
    needs: [get_version]
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Prepare NuGet cache directory
        run: |
          # Create directory if it doesn't exist
          mkdir -Force "C:\Users\runneradmin\.nuget\packages"
          # Get and report actual NuGet packages location
          dotnet nuget locals global-packages --list
        shell: pwsh

      - name: Setup NuGet cache
        id: cache-msbuild
        uses: actions/cache@v5
        with:
          path: |
            C:\Users\runneradmin\.nuget\packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup .NET cache
        id: cache-dotnet
        uses: actions/cache@v5
        with:
          path: src-tauri/libs/
          key: ${{ runner.os }}-dotnet-${{ hashFiles('libs/**/*.cs', 'libs/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-dotnet-

      - name: Build .NET libraries
        if: steps.cache-dotnet.outputs.cache-hit != 'true' || github.event.inputs.force_dotnet_build == 'true'
        run: MSBuild.exe .\libs\SteamUtility.csproj
        shell: pwsh

      - name: Upload built .NET libraries
        uses: actions/upload-artifact@v7
        with:
          name: dotnet-libs
          path: src-tauri/libs/
          retention-days: 1

  build_release_bundle:
    needs: [build_dotnet_libs, get_version]
    timeout-minutes: 30
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup pnpm cache
        id: cache-pnpm
        uses: actions/cache@v5
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ runner.OS }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.OS }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}-

      - name: Install dependencies (pnpm)
        if: steps.cache-pnpm.outputs.cache-hit != 'true' || github.event.inputs.force_pnpm_install == 'true'
        run: pnpm install --frozen-lockfile

      - name: Setup Next.js cache
        id: cache-nextjs
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: ${{ runner.OS }}-nextjs-${{ hashFiles('**.[jt]sx', '**.[jt]s', 'package.json') }}
          restore-keys: |
            ${{ runner.OS }}-nextjs-

      - name: Clean Next.js cache
        if: steps.cache-nextjs.outputs.cache-hit != 'true' || github.event.inputs.force_nextjs_build == 'true'
        run: |
          if (Test-Path ".next") {
            Remove-Item -Recurse -Force .next
            Write-Host "Next.js cache cleared"
          } else {
            Write-Host "No Next.js cache found"
          }
        shell: pwsh

      - name: Setup Rust cache
        id: cache-rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Clean Cargo artifacts
        if: steps.cache-rust.outputs.cache-hit != 'true' || github.event.inputs.force_cargo_clean == 'true'
        run: cargo clean
        working-directory: ./src-tauri

      - name: Create .env file
        run: |
          echo "KEY=${{ secrets.KEY }}" > .env
        shell: pwsh
        working-directory: ${{ github.workspace }}

      - name: Download built .NET libraries
        uses: actions/download-artifact@v8
        with:
          name: dotnet-libs
          path: src-tauri/libs/

      - name: Build and package Tauri app
        run: |
          $env:NEXT_TELEMETRY_DISABLED = "1"
          $env:TAURI_CI = "1"
          pnpm tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: pwsh

      - name: Update latest.json with signature
        run: |
          python -c "
          import base64
          import json

          nsis_signature_path = './src-tauri/target/release/bundle/nsis/Steam Game Idler_${{ needs.get_version.outputs.version }}_x64-setup.nsis.zip.sig'
          latest_json_path = './latest.json'

          with open(nsis_signature_path, 'r') as sig_file:
              new_signature = sig_file.read().strip()

          with open(latest_json_path, 'r') as json_file:
              latest_json = json.load(json_file)

          latest_json['platforms']['windows-x86_64']['signature'] = new_signature
          
          # Also ensure the URL is perfectly matched with the current version
          version = '${{ needs.get_version.outputs.version }}'
          latest_json['platforms']['windows-x86_64']['url'] = f'https://github.com/kaisma0/steam-game-idler/releases/download/{version}/Steam.Game.Idler_{version}_x64-setup.nsis.zip'

          is_major = False
          latest_json['major'] = is_major

          with open(latest_json_path, 'w') as json_file:
              json.dump(latest_json, json_file, indent=2)

          print('Updated latest.json with new signature')
          "

      - name: Commit signature to latest.json
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore(version): add signature for v${{ needs.get_version.outputs.version }}"
          file_pattern: 'latest.json'
      - name: Generate release notes
        id: generate_notes
        run: |
          echo "Release v${{ needs.get_version.outputs.version }}" > release_notes.md

      - name: Prepare portable executable
        run: |
          # Create portable package directory
          $portableDir = "./portable-package"
          New-Item -ItemType Directory -Force -Path $portableDir
          
          # Copy the executable with the correct name
          Copy-Item "./src-tauri/target/release/Steam Game Idler.exe" -Destination "$portableDir/Steam Game Idler.exe"
          
          # Copy the libs folder
          Copy-Item "./src-tauri/libs" -Destination "$portableDir/libs" -Recurse -Force
          
          # Create the portable zip
          Compress-Archive -Path "$portableDir/*" -DestinationPath "./src-tauri/target/release/Steam Game Idler_${{ needs.get_version.outputs.version }}_x64-portable.zip" -Force
          
          # Clean up temporary directory
          Remove-Item -Recurse -Force $portableDir
        shell: pwsh

      - name: Create release
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.get_version.outputs.version }}
          name: Steam Game Idler v${{ needs.get_version.outputs.version }}
          body_path: ./release_notes.md
          files: |
            ./src-tauri/target/release/bundle/nsis/Steam Game Idler_${{ needs.get_version.outputs.version }}_x64-setup.exe
            ./src-tauri/target/release/bundle/nsis/Steam Game Idler_${{ needs.get_version.outputs.version }}_x64-setup.nsis.zip
            ./src-tauri/target/release/bundle/nsis/Steam Game Idler_${{ needs.get_version.outputs.version }}_x64-setup.nsis.zip.sig
            ./src-tauri/target/release/Steam Game Idler_${{ needs.get_version.outputs.version }}_x64-portable.zip

      - name: Cleanup artifacts
        if: always()
        uses: geekyeggo/delete-artifact@v6
        with:
          name: dotnet-libs
